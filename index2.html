<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ストレッチ・筋トレ・ジム記録タイマー</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #e5e7eb;
      --accent: #111827;
      --done: #e7f6ec;
      --soft: #eef0f2;
      --warn: #fff4df;
      --stretch: #ffe9e9;
      --ok: #e7f6ec;
      --input: #fbfbfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    h1 { font-size: 24px; margin: 8px 0 6px; }
    .sub { color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 8px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    .menuTitle { font-size: 18px; font-weight: 850; margin-bottom: 4px; }
    .menuDesc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .step { color: var(--muted); font-size: 14px; margin-bottom: 8px; }
    .exercise { font-size: 27px; font-weight: 850; margin-bottom: 8px; line-height: 1.25; }
    .note { color: var(--muted); line-height: 1.65; margin-bottom: 12px; }
    .chips { display: grid; gap: 8px; margin: 12px 0 0; }
    .chip {
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.45;
      border: 1px solid var(--line);
    }
    .chip strong { margin-right: 4px; }
    .chip.stretch { background: var(--stretch); }
    .chip.ok { background: var(--ok); }
    .chip.warn { background: var(--warn); }
    .timer {
      font-variant-numeric: tabular-nums;
      font-size: 70px;
      font-weight: 850;
      text-align: center;
      margin: 18px 0;
      letter-spacing: 0.03em;
    }
    .bar {
      height: 12px;
      background: #edf0f2;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 18px;
    }
    .bar > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s linear;
    }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 15px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary { background: var(--accent); color: white; }
    .secondary { background: var(--soft); color: var(--text); }
    .wide { grid-column: 1 / -1; }
    .smallBtns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .smallBtns button { padding: 11px 10px; font-size: 14px; }
    .tip { font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 12px; }
    .list { display: grid; gap: 8px; margin-top: 12px; }
    .item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .item.current { border-color: #111827; box-shadow: inset 0 0 0 1px #111827; }
    .item.done { background: var(--done); color: #285c3a; }
    .check {
      width: 20px;
      height: 20px;
      border: 2px solid #9aa4b2;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 900;
    }
    .item.done .check { border-color: #2f855a; }
    .dur { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .logInputs {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 14px 0 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--input);
    }
    .logInputs.show { display: grid; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
    }
    .field.memo { grid-column: 1 / -1; }
    .field textarea { min-height: 48px; resize: vertical; }
    .recordBox {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    textarea#exportText {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.55;
      background: #fbfbfa;
      color: var(--text);
      white-space: pre-wrap;
    }
    .recordBtns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .recordBtns button { padding: 12px 10px; font-size: 14px; }
    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }
    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .quick button {
      padding: 11px 10px;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      body { padding: 14px; }
      .tabs { grid-template-columns: 1fr 1fr; }
      .timer { font-size: 60px; }
      .buttons { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .exercise { font-size: 24px; }
      .logInputs { grid-template-columns: 1fr 1fr; }
      .field.memo { grid-column: 1 / -1; }
      .recordBtns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ストレッチ・筋トレ・ジム記録タイマー</h1>
    <div class="sub">終了したら「完了チェック → 次へ」。実施内容は下の記録欄に出るので、コピーしてチャッピーに貼れます。</div>

    <div class="tabs" id="tabs"></div>

    <div class="card">
      <div class="menuTitle" id="menuTitle"></div>
      <div class="menuDesc" id="menuDesc"></div>

      <div class="step" id="stepText"></div>
      <div class="exercise" id="exerciseName"></div>
      <div class="note" id="exerciseNote"></div>

      <div class="chips">
        <div class="chip stretch" id="targetText"></div>
        <div class="chip ok" id="formText"></div>
        <div class="chip warn" id="avoidText"></div>
      </div>

      <div class="logInputs" id="logInputs">
        <div class="field">
          <label for="weightInput">重量 kg</label>
          <input id="weightInput" inputmode="decimal" placeholder="例 70" />
        </div>
        <div class="field">
          <label for="repsInput">回数</label>
          <input id="repsInput" inputmode="numeric" placeholder="例 12" />
        </div>
        <div class="field">
          <label for="setsInput">セット</label>
          <input id="setsInput" inputmode="numeric" placeholder="例 2" />
        </div>
        <div class="field">
          <label for="effortInput">余裕度</label>
          <select id="effortInput">
            <option value="">選択なし</option>
            <option value="余裕あり">余裕あり</option>
            <option value="ちょうど良い">ちょうど良い</option>
            <option value="きつい">きつい</option>
            <option value="痛みあり">痛みあり</option>
          </select>
        </div>
        <div class="field memo">
          <label for="memoInput">メモ</label>
          <textarea id="memoInput" placeholder="例：フォーム安定、右膝に違和感、次回+2.5kgなど"></textarea>
        </div>
      </div>

      <div class="timer" id="timerText">00:30</div>
      <div class="bar"><div id="progress"></div></div>

      <div class="buttons">
        <button class="primary" id="startPauseBtn">開始</button>
        <button class="secondary" id="resetBtn">この種目をリセット</button>
        <button class="primary wide" id="doneNextBtn">完了チェック → 次へ</button>
      </div>

      <div class="smallBtns">
        <button class="secondary" id="prevBtn">前へ</button>
        <button class="secondary" id="restartMenuBtn">このメニューを最初から</button>
      </div>

      <div class="quick" id="gymQuickButtons">
        <button class="secondary" id="halfGymBtn">今日は軽め：有酸素＋3種目だけ</button>
        <button class="secondary" id="fullGymBtn">通常ジムメニューに戻す</button>
      </div>

      <div class="tip" id="tipText"></div>
    </div>

    <div class="card">
      <strong>今日のメニュー</strong>
      <div class="list" id="list"></div>
    </div>

    <div class="card">
      <strong>チャッピーに貼る用の記録</strong>
      <div class="recordBox">
        <textarea id="exportText" readonly></textarea>
        <div class="recordBtns">
          <button class="primary" id="copyBtn">記録をコピー</button>
          <button class="secondary" id="refreshRecordBtn">記録を更新</button>
          <button class="secondary" id="clearRecordBtn">今日の記録を消す</button>
        </div>
        <div class="status" id="copyStatus"></div>
      </div>
    </div>
  </div>

const menuTitle = document.getElementById("menuTitle");
const menuDesc = document.getElementById("menuDesc");
const stepText = document.getElementById("stepText");
const exerciseName = document.getElementById("exerciseName");
const exerciseNote = document.getElementById("exerciseNote");
const timerText = document.getElementById("timerText");
const progress = document.getElementById("progress");
const startPauseBtn = document.getElementById("startPauseBtn");
const resetBtn = document.getElementById("resetBtn");
const doneNextBtn = document.getElementById("doneNextBtn");
const prevBtn = document.getElementById("prevBtn");
const restartMenuBtn = document.getElementById("restartMenuBtn");
const list = document.getElementById("list");
const tipText = document.getElementById("tipText");
const targetText = document.getElementById("targetText");
const formText = document.getElementById("formText");
const avoidText = document.getElementById("avoidText");
const logInputs = document.getElementById("logInputs");
const weightInput = document.getElementById("weightInput");
const repsInput = document.getElementById("repsInput");
const setsInput = document.getElementById("setsInput");
const effortInput = document.getElementById("effortInput");
const memoInput = document.getElementById("memoInput");
const exportText = document.getElementById("exportText");
const copyBtn = document.getElementById("copyBtn");
const refreshRecordBtn = document.getElementById("refreshRecordBtn");
const clearRecordBtn = document.getElementById("clearRecordBtn");
const copyStatus = document.getElementById("copyStatus");
const gymQuickButtons = document.getElementById("gymQuickButtons");
const halfGymBtn = document.getElementById("halfGymBtn");
const fullGymBtn = document.getElementById("fullGymBtn");

function currentMenu() { return menus[menuKey]; }
function exercises() { return currentMenu().exercises; }

function fmt(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${m}:${s}`;
}

function nowText() {
  const d = new Date();
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${y}/${mo}/${da} ${h}:${mi}`;
}

function renderTabs() {
  tabs.innerHTML = "";
  Object.entries(menus).forEach(([key, menu]) => {
    const btn = document.createElement("button");
    btn.className = "tab" + (key === menuKey ? " active" : "");
    btn.textContent = menu.label;
    btn.addEventListener("click", () => switchMenu(key));
    tabs.appendChild(btn);
  });
}

function renderList() {
  list.innerHTML = "";
  exercises().forEach((ex, i) => {
    const div = document.createElement("div");
    div.className = "item" + (done[i] ? " done" : "") + (i === index ? " current" : "");
    div.innerHTML = `
      <div class="check">${done[i] ? "✓" : ""}</div>
      <div>${i + 1}. ${ex.name}</div>
      <div class="dur">${fmt(ex.sec)}</div>
    `;
    div.addEventListener("click", () => {
      index = i;
      remaining = exercises()[index].sec;
      stopTimer();
      render();
    });
    list.appendChild(div);
  });
}

function fillLogInputs(ex) {
  if (!ex.log) {
    logInputs.classList.remove("show");
    return;
  }
  logInputs.classList.add("show");
  weightInput.value = ex.defaultWeight || "";
  repsInput.value = ex.defaultReps || "";
  setsInput.value = ex.defaultSets || "";
  effortInput.value = "";
  memoInput.value = "";
}

function render() {
  const menu = currentMenu();
  const exs = exercises();
  const ex = exs[index];
  const g = guide[ex.guide] || guide.stretch;

  renderTabs();
  menuTitle.textContent = menu.title;
  menuDesc.textContent = menu.desc;
  stepText.textContent = `Step ${index + 1} / ${exs.length}`;
  exerciseName.textContent = ex.name;
  exerciseNote.textContent = ex.note;

  targetText.innerHTML = `<strong>${g.target.split("：")[0]}：</strong>${g.target.split("：").slice(1).join("：")}`;
  formText.innerHTML = `<strong>やり方：</strong>${g.form}`;
  avoidText.innerHTML = `<strong>注意：</strong>${g.avoid.replace(/^注意：/, "")}`;

  timerText.textContent = fmt(remaining);
  const pct = ((ex.sec - remaining) / ex.sec) * 100;
  progress.style.width = `${Math.max(0, Math.min(100, pct))}%`;

  startPauseBtn.textContent = running ? "一時停止" : "開始";
  doneNextBtn.textContent = index === exs.length - 1 ? "完了チェック → 終了" : "完了チェック → 次へ";
  tipText.textContent = menu.tip;
  gymQuickButtons.style.display = menuKey === "gym" ? "grid" : "none";

  fillLogInputs(ex);
  renderList();
  updateExportText();
}

function startTimer() {
  if (running) return;
  running = true;
  interval = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) {
      remaining = 0;
      stopTimer();
      beep();
    }
    renderTimerOnly();
  }, 1000);
  renderTimerOnly();
}

function renderTimerOnly() {
  const ex = exercises()[index];
  timerText.textContent = fmt(remaining);
  const pct = ((ex.sec - remaining) / ex.sec) * 100;
  progress.style.width = `${Math.max(0, Math.min(100, pct))}%`;
  startPauseBtn.textContent = running ? "一時停止" : "開始";
}

function stopTimer() {
  running = false;
  if (interval) clearInterval(interval);
  interval = null;
  renderTimerOnly();
}

function resetCurrent() {
  stopTimer();
  remaining = exercises()[index].sec;
  renderTimerOnly();
}

function recordCurrent() {
  const ex = exercises()[index];
  const existingIdx = sessionLogs.findIndex(x => x.menuKey === menuKey && x.stepIndex === index);
  const entry = {
    time: nowText(),
    menuKey,
    menuLabel: currentMenu().label,
    stepIndex: index,
    name: ex.name,
    duration: fmt(ex.sec),
    weight: ex.log ? weightInput.value.trim() : "",
    reps: ex.log ? repsInput.value.trim() : "",
    sets: ex.log ? setsInput.value.trim() : "",
    effort: ex.log ? effortInput.value : "",
    memo: ex.log ? memoInput.value.trim() : ""
  };
  if (existingIdx >= 0) {
    sessionLogs[existingIdx] = entry;
  } else {
    sessionLogs.push(entry);
  }
  updateExportText();
}

function nextExercise() {
  const exs = exercises();
  done[index] = true;
  recordCurrent();

  if (index < exs.length - 1) {
    index += 1;
    remaining = exs[index].sec;
    stopTimer();
    render();
    startTimer();
  } else {
    stopTimer();
    remaining = 0;
    render();
    alert("このメニューは完了です。下の記録をコピーしてチャッピーに貼れます。");
  }
}

function prevExercise() {
  if (index > 0) {
    stopTimer();
    index -= 1;
    remaining = exercises()[index].sec;
    render();
  }
}

function restartMenu() {
  stopTimer();
  index = 0;
  done = Array(exercises().length).fill(false);
  remaining = exercises()[0].sec;
  render();
}

function switchMenu(key) {
  stopTimer();
  menuKey = key;
  index = 0;
  done = Array(exercises().length).fill(false);
  remaining = exercises()[0].sec;
  render();
}

function setLightGym() {
  menus.gym.exercises = JSON.parse(JSON.stringify(lightGymExercises));
  if (menuKey !== "gym") menuKey = "gym";
  restartMenu();
}

function setFullGym() {
  menus.gym.exercises = JSON.parse(JSON.stringify(baseMenus.gym.exercises));
  if (menuKey !== "gym") menuKey = "gym";
  restartMenu();
}

function updateExportText() {
  const byMenu = {};
  sessionLogs.forEach(log => {
    if (!byMenu[log.menuLabel]) byMenu[log.menuLabel] = [];
    byMenu[log.menuLabel].push(log);
  });

  const lines = [];
  lines.push(`今日の運動記録：${nowText()}`);
  lines.push("");

  if (sessionLogs.length === 0) {
    lines.push("まだ完了チェックされた種目はありません。");
  } else {
    Object.entries(byMenu).forEach(([menuLabel, logs]) => {
      lines.push(`【${menuLabel}】`);
      logs
        .sort((a, b) => a.stepIndex - b.stepIndex)
        .forEach(log => {
          let detail = `- ${log.name}`;
          const parts = [];
          if (log.weight) parts.push(`重量/速度 ${log.weight}`);
          if (log.reps) parts.push(`回数/時間 ${log.reps}`);
          if (log.sets) parts.push(`${log.sets}セット`);
          if (log.effort) parts.push(log.effort);
          if (parts.length) detail += `：${parts.join("、")}`;
          if (log.memo) detail += `。メモ：${log.memo}`;
          lines.push(detail);
        });
      lines.push("");
    });
  }

  lines.push("コメント：");
  lines.push("食事・体調・ゴルフ予定に合わせて、次回の調整をお願いします。");
  exportText.value = lines.join("\n");
}

async function copyRecord() {
  updateExportText();
  try {
    await navigator.clipboard.writeText(exportText.value);
    copyStatus.textContent = "コピーしました。このままチャッピーに貼れます。";
  } catch (e) {
    exportText.focus();
    exportText.select();
    document.execCommand("copy");
    copyStatus.textContent = "コピーを試行しました。できない場合は記録欄を長押しして手動コピーしてください。";
  }
}

function clearRecord() {
  if (!confirm("今日の記録を消しますか？")) return;
  sessionLogs = [];
  done = Array(exercises().length).fill(false);
  updateExportText();
  renderList();
  copyStatus.textContent = "記録を消しました。";
}

function beep() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.08;
    osc.start();
    setTimeout(() => {
      osc.stop();
      ctx.close();
    }, 180);
  } catch (e) {}
}

startPauseBtn.addEventListener("click", () => running ? stopTimer() : startTimer());
resetBtn.addEventListener("click", resetCurrent);
doneNextBtn.addEventListener("click", nextExercise);
prevBtn.addEventListener("click", prevExercise);
restartMenuBtn.addEventListener("click", restartMenu);
copyBtn.addEventListener("click", copyRecord);
refreshRecordBtn.addEventListener("click", () => {
  updateExportText();
  copyStatus.textContent = "記録を更新しました。";
});
clearRecordBtn.addEventListener("click", clearRecord);
halfGymBtn.addEventListener("click", setLightGym);
fullGymBtn.addEventListener("click", setFullGym);

render();
</script>
</body>
</html>
